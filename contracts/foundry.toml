[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
robinhood_testnet = "https://rpc.testnet.chain.robinhood.com"

# Robinhood Chain testnet explorer is a Blockscout instance; verification
# works with --verifier blockscout when desired:
#   forge verify-contract <address> src/DimidiumNursery.sol:DimidiumNursery \
#     --verifier blockscout \
#     --verifier-url https://explorer.testnet.chain.robinhood.com/api
